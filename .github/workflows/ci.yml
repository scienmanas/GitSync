name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    # "Does this still work?" gate. Runs on every PR (including Dependabot's),
    # so a dependency bump that removes/renames a symbol main.py imports goes red.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      - name: Byte-compile
        run: uv run python -m compileall -q main.py

      - name: Import smoke test
        # Importing exercises every top-level dependency against the locked
        # versions; a broken/renamed API surfaces here without needing tokens.
        run: uv run python -c "import main"
